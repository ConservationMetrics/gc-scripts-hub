summary: "CyberTracker: Import Observations From Backup"
description: ""
lock: "!inline f/connectors/cybertracker/cybertracker_observations_from_backup.script.lock"
concurrency_time_window_s: 0
kind: script
schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  type: object
  order:
    - cybertracker_observations_path
    - db
    - db_table_name
    - attachment_root
  properties:
    attachment_root:
      type: string
      description: >-
        The path where the data is stored in Guardian Connector.
      default: /persistent-storage/datalake
      originalType: string
    db:
      type: object
      description: A database connection for storing tabular data.
      default: null
      format: resource-postgresql
    db_table_name:
      type: string
      description: The name of the database table where the form data will be stored.
      default: null
      originalType: string
      pattern: "^.{1,54}$"
    cybertracker_observations_path:
      type: string
      description: >-
        The path (in attachment root) to the CyberTracker observations JSON file to import,
        e.g. "my_cybertracker_backup/data/0.json".
      default: null
      originalType: string
      pattern: \.json$

  required:
    - cybertracker_observations_path
    - db
    - db_table_name
