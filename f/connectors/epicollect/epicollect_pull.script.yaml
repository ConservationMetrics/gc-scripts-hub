summary: 'EpiCollect5: Fetch Survey Entries'
description: >-
  Uses the EpiCollect5 REST API to download project metadata, survey entries,
  and media attachments
lock: '!inline f/connectors/epicollect/epicollect_pull.script.lock'
concurrency_time_window_s: 0
kind: script
schema:
  $schema: 'https://json-schema.org/draft/2020-12/schema'
  type: object
  order:
    - project_slug
    - client_id
    - client_secret
    - db
    - db_table_name
    - attachment_root
  properties:
    attachment_root:
      type: string
      description: >-
        A path where EpiCollect5 attachments will be stored. Files will be
        stored as: `{attachment_root}/{db_table_name}/attachments/{filename}`
      default: /persistent-storage/datalake
      originalType: string
    client_id:
      type: integer
      description: >-
        Client ID for a project App. Only required for private projects. Create
        a project App in the Apps tab to obtain this. See
        https://developers.epicollect.net/api-authentication/create-client-app
      default: null
      originalType: integer
    client_secret:
      type: string
      description: >-
        Client Secret for a project App. Only required for private projects.
        Create a project App in the Apps tab to obtain this.
      default: null
      originalType: string
    db:
      type: object
      description: A database connection for storing tabular data.
      default: null
      format: resource-postgresql
    db_table_name:
      type: string
      description: The name of the database table where entries will be stored.
      default: null
      originalType: string
      pattern: '^.{1,54}$'
    project_slug:
      type: string
      description: >-
        The project slug, found in the project URL
        (https://five.epicollect.net/project/{slug}) or on the project's API
        tab.
      default: null
      originalType: string
  required:
    - project_slug
    - db
    - db_table_name
