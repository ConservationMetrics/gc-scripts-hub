  hiddenInlineScripts:
    - name: 1 Fetch tables from Postgres
      autoRefresh: true
      fields:
        db:
          type: static
          value: '$res:f/connectors/postgresql'
          fieldType: object
          format: resource-postgresql
      inlineScript:
        content: '!inline 1_fetch_tables_from_postgres.inline_script.py'
        lock: '!inline 1_fetch_tables_from_postgres.inline_script.lock'
        language: python3
        path: f/apps/local_contexts/1_Fetch_tables_from_Postgres
        schema:
          $schema: 'https://json-schema.org/draft/2020-12/schema'
          type: object
          properties:
            db:
              type: object
              description: ''
              default: null
              format: resource-postgresql
          required:
            - db
      recomputeIds: []
      recomputeOnInputChanged: false
      transformer:
        content: |-
          state.tables = Object.values(result)
            // Remove tables that end with internal suffixes we don’t want to show
            .filter(name =>
              !name.endsWith("__columns") &&
              !name.endsWith("__labels") &&
              !name.endsWith("__metadata")
            )
            // Remove local contexts tables
            .filter(name =>
              !name.includes("localcontexts") &&
              !name.includes("lc_labels")
            )
            // Sort remaining table names alphabetically
            .sort((a, b) => a.localeCompare(b))

            state.localContextsTables = Object.values(result)
            // Only local contexts tables
            .filter(name =>
              name.includes("localcontexts")
            )
            // Sort remaining table names alphabetically
            .sort((a, b) => a.localeCompare(b))
        language: frontend
        path: f/apps/local_contexts/Transformer
        suggestedRefreshOn:
          - id: state
            key: tables
          - id: state
            key: localContextsTables
    - name: 1 Set state.localContextsTable & trigger fetch
      autoRefresh: false
      fields: {}
      inlineScript:
        content: >-
          !inline
          1_set_state.localcontextstable_&_trigger_fetch.inline_script.frontend.js
        language: frontend
        path: f/apps/local_contexts/1_Set_state.localContextsTable_&_trigger_fetch
        refreshOn:
          - id: selectLocalContextsTable
            key: result
        suggestedRefreshOn:
          - id: state
            key: localContextsTable
      recomputeOnInputChanged: true
    - name: 1 Fetch LC Labels and existing mappings
      autoRefresh: false
      fields:
        dataset_name:
          type: evalv2
          value: null
          connections:
            - id: datasetName
              componentId: state
          expr: state.datasetName
          fieldType: ''
        db:
          type: static
          value: '$res:f/connectors/postgresql'
          fieldType: object
          format: resource-postgresql
        lcTableName:
          type: evalv2
          value: null
          connections:
            - id: localContextsTable
              componentId: state
          expr: state.localContextsTable
          fieldType: ''
      inlineScript:
        content: '!inline 1_fetch_lc_labels_and_existing_mappings.inline_script.py'
        lock: '!inline 1_fetch_lc_labels_and_existing_mappings.inline_script.lock'
        language: python3
        path: f/apps/local_contexts/1_Fetch_LC_labels_and_existing_mappings
        schema:
          $schema: 'https://json-schema.org/draft/2020-12/schema'
          type: object
          properties:
            dataset_name:
              type: ''
              description: ''
              default: null
            db:
              type: object
              description: ''
              default: null
              format: resource-postgresql
            lcTableName:
              type: ''
              description: ''
              default: null
          required:
            - db
            - lcTableName
            - dataset_name
      recomputeIds: []
      recomputeOnInputChanged: false
      transformer:
        content: |-
          state.tkLabelsAvailable = result.tk_labels_available
          state.bcLabelsAvailable = result.bc_labels_available
          state.tkLabelsAlreadyApplied = result.tk_labels_already_applied
          state.bcLabelsAlreadyApplied = result.bc_labels_already_applied
          state.canApplyLabels = true
        language: frontend
        path: f/apps/local_contexts/Transformer
        suggestedRefreshOn:
          - id: state
            key: tkLabelsAlreadyApplied
          - id: state
            key: bcLabelsAvailable
          - id: state
            key: tkLabelsAvailable
          - id: state
            key: bcLabelsAlreadyApplied
          - id: state
            key: canApplyLabels
    - name: 1 Set state.datasetName
      autoRefresh: true
      fields: {}
      inlineScript:
        content: '!inline 1_set_state.datasetname.inline_script.frontend.js'
        language: frontend
        path: f/apps/local_contexts/1_Set_state.datasetName
        refreshOn:
          - id: selectDatasetTable
            key: result
        suggestedRefreshOn:
          - id: state
            key: datasetName
      recomputeIds: []
      recomputeOnInputChanged: true
    - name: 2 Set state.labelsToApply
      autoRefresh: false
      fields: {}
      inlineScript:
        content: '!inline 2_set_state.labelstoapply.inline_script.frontend.js'
        language: frontend
        path: f/apps/local_contexts/2_Set_state.labelsToApply
        refreshOn:
          - id: selectBCLabels
            key: result
          - id: selectTKLabels
            key: result
        suggestedRefreshOn:
          - id: state
            key: labelsToApply
      recomputeIds: []
      recomputeOnInputChanged: true
